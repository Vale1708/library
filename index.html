<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale's Library</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="search-container">
                <img src="./images/search_icon.svg" alt="search-icon" clas="search-icon">
                <input type="search" class="searchbar" placeholder="Search">
            </div>
            <div class="header-buttons-container">
                <button type = "button" class="header-button">
                    <img src = "images/notification_icon.svg" alt="notification-icon" class="notification-icon">
                </button>
                <button type = "button" class="header-button">
                    <img src = "images/dark_mode_icon.svg" alt = "dark-mode-icon" class="dark-mode-icon">
                </button>
                <button type = "button" class="profile-button">
                    <img src= "images/profile-icon.jpg" alt = "profile-icon" class="profile-icon">
                </button>
            </div>
            <div class="sidebar-container">
                <a href="#" class="application-logo">
                    <img src="images/application-logo-icon.svg" alt="application-logo-icon" class="application-logo-icon">
                    <h2>Vale's Library</h2>
                </a>
                <ul class = "menu">
                    <li>
                        <a href="#" class="menu-item">
                            <span class="menu-icon active">
                                <img src="images/discover_icon.svg">
                            </span>
                            <span class="menu-text">Discover</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item">
                            <span class="menu-icon">
                                <img src="images/my_library_icon.svg">
                            </span>
                            <span class="menu-text">My Library</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item">
                            <span class="menu-icon">
                                <img src="images/favorite_icon.svg">
                            </span>
                            <span class="menu-text">Favorite</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="menu-item">
                            <span class="menu-icon">
                                <img src="images/settings_icon.svg">
                            </span>
                            <span class="menu-text">Settings</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
